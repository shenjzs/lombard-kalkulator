<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lombard | Kalkulator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome dla ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="announcement-banner">
        <span class="announcement-icon">⚠️</span>
        <div class="announcement-text">
            Jakbyście wyhaczyli jakiś błąd to dajcie znać dc: @shenjzs
        </div>
    </div>

    <div class="container">
        <header>
            <h1>ELCARTEL PAWN SHOP</h1>
            <p>Wyceń towary</p>
            <div class="last-update">Ostatnia aktualizacja cen: <span id="update-date">03.05.2026</span></div>
        </header>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Wyszukaj przedmiot...">
        </div>

        <div class="categories-container">
            <button class="cat-btn active" onclick="filterCategory('wszystkie', this)">
                <i class="fas fa-border-all"></i> Wszystkie
            </button>
            <button class="cat-btn" onclick="filterCategory('elektronika', this)">
                <i class="fas fa-laptop"></i> Elektronika
            </button>
            <button class="cat-btn" onclick="filterCategory('biżuteria', this)">
                <i class="fas fa-gem"></i> Biżuteria
            </button>
            <button class="cat-btn" onclick="filterCategory('dom', this)">
                <i class="fas fa-home"></i> Dom
            </button>
            <button class="cat-btn" onclick="filterCategory('inne', this)">
                <i class="fas fa-box-open"></i> Inne
            </button>
        </div>

        <div id="items-list" class="items-grid">
            <!-- Przedmioty generowane przez JS -->
        </div>

        <div class="summary-bar">
            <div class="summary-info">
                <div class="total-group">
                    <span class="total-label">Suma (minimum):</span>
                    <span id="total-price" class="total-amount">0$</span>
                </div>
                <div class="bonus-group">
                    <span class="bonus-label">Możliwa dopłata:</span>
                    <span id="bonus-range" class="bonus-amount">+0$</span>
                </div>
            </div>
            <button id="reset-btn" class="reset-button">
                <i class="fas fa-trash-alt"></i> Wyczyść koszyk
            </button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
