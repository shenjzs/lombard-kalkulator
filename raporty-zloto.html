<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Cartel | Statystyki Złota</title>
    <link rel="stylesheet" href="style-zloto.css?v=2.7.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo"><i class="fas fa-chart-line"></i> GOLD ANALYTICS</div>
        <div class="nav-links">
            <a href="zloto.html" class="nav-link-btn"><i class="fas fa-arrow-left"></i> Powrót do odlewni</a>
        </div>
    </nav>

    <div class="container" style="padding-top: 40px;">
        <header>
            <h1>RAPORTY PRZETAPU</h1>
            <p>Zalogowano jako: <strong id="logged-boss-name" style="color: var(--accent-color);">---</strong></p>
            <div style="margin-top: 20px;">
                <button onclick="loadGoldStats()" class="refresh-btn">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i> Odśwież statystyki
                </button>
            </div>
        </header>

        <div class="kpi-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;">
            <div class="comparison-card" style="padding: 30px;">
                <span class="comp-label">Łącznie wydano na biżuterię</span>
                <span id="stat-total-spent" class="val-red" style="font-size: 2rem; font-weight: 900;">0$</span>
            </div>
            <div class="comparison-card" style="padding: 30px;">
                <span class="comp-label">Wartość sztabek (Przychód)</span>
                <span id="stat-total-revenue" class="val-gold" style="font-size: 2rem; font-weight: 900;">0$</span>
            </div>
            <div class="comparison-card" style="padding: 30px; border: 2px solid var(--success);">
                <span class="comp-label">Zysk na czysto</span>
                <span id="stat-total-profit" class="val-green" style="font-size: 2rem; font-weight: 900; color: var(--success);">0$</span>
            </div>
        </div>

        <div class="smeltery-input-card">
            <h3 class="section-title">Historia operacji w odlewni</h3>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 900px;">
                    <thead>
                        <tr style="text-align: left; color: var(--accent-color); border-bottom: 1px solid #333;">
                            <th style="padding: 15px; width: 15%;">Data</th>
                            <th style="padding: 15px; width: 15%;">Pracownik</th>
                            <th style="padding: 15px; width: 45%;">Materiały i Wynik</th>
                            <th style="padding: 15px; text-align: right; width: 12%;">Wydatki</th>
                            <th style="padding: 15px; text-align: right; width: 13%;">Przychód</th>
                        </tr>
                    </thead>
                    <tbody id="gold-logs-body">
                        <tr><td colspan="5" style="text-align:center; padding: 40px; color: #666;">Ładowanie danych z bazy...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="raporty-zloto.js?v=2.7.0"></script>
</body>
</html>
