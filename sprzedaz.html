<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Cartel | Panel eksportu</title>
    <link rel="stylesheet" href="style-sprzedaz.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <i class="fas fa-box-open"></i> EL CARTEL SYSTEM
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link-btn">
                <i class="fas fa-cash-register"></i> Kasa (skup)
            </a>
            <a href="raporty.html" class="nav-link-btn">
                <i class="fas fa-chart-line"></i> Statystyki
            </a>
        </div>
    </nav>

    <div class="container" style="padding-top: 40px;">
        <header>
            <h1>EL CARTEL EXPORT</h1>
            <div class="header-meta">
                <span><i class="fas fa-truck-loading"></i> SYSTEM RAPORTOWANIA O SPRZEDAŻY PRZEDMIOTÓW</span>
                <span id="header-date"><i class="far fa-calendar-alt"></i> --.--.----</span>
            </div>
        </header>

        <div class="search-container">
            <i class="fas fa-search" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
            <input type="text" id="search-input" placeholder="Szukaj przedmiotu po nazwie..." style="padding-left: 55px;">
        </div>

        <div class="categories-container">
            <button class="cat-btn active" onclick="filterCategory('wszystkie', this)"><i class="fas fa-border-all"></i> Wszystko</button>
            <button class="cat-btn" onclick="filterCategory('elektronika', this)"><i class="fas fa-laptop"></i> Elektronika</button>
            <button class="cat-btn" onclick="filterCategory('biżuteria', this)"><i class="fas fa-gem"></i> Biżuteria</button>
            <button class="cat-btn" onclick="filterCategory('dom', this)"><i class="fas fa-home"></i> Dom</button>
            <button class="cat-btn" onclick="filterCategory('inne', this)"><i class="fas fa-box-open"></i> Inne</button>
        </div>

        <div class="asortyment-header">
            <h3 class="asortyment-title">ASORTYMENT</h3>
            <button class="custom-product-btn" onclick="addCustomItemSlot()">
                + NIESTANDARDOWY PRODUKT
            </button>
        </div>

        <div id="items-list" class="items-grid">
            </div>
    </div>

    <div class="summary-bar" id="summary-bar">
        <button class="summary-toggle" onclick="toggleSummary()">
            <i class="fas fa-chevron-up" id="toggle-icon"></i>
        </button>
        
        <div class="total-info">
            <span class="total-label">Suma skupu</span>
            <span id="total-price" class="total-amount">0$</span>
        </div>

        <div class="actions">
            <button type="button" class="cart-toggle-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> Wybrane <span id="cart-badge" class="cart-badge">0</span>
            </button>

            <div class="input-wrapper" style="position: relative; display: flex; align-items: center;">
                <i class="fas fa-lock" style="position: absolute; left: 15px; color: var(--text-secondary);"></i>
                <input type="password" id="employee-pin-input" class="custom-input" placeholder="Wpisz PIN" style="padding-left: 45px; letter-spacing: 3px;" required>
            </div>
            
            <div class="button-group" style="display: flex; gap: 10px;">
                <button id="reset-btn" class="close-btn" style="padding: 15px 20px;">
                    <i class="fas fa-trash-alt"></i>
                </button>
                
                <button onclick="generateQuote()" class="quote-button">
                    <i class="fas fa-file-invoice-dollar"></i> GENERUJ
                </button>
            </div>
        </div>
    </div>

    <div id="quote-modal" class="modal">
        <div class="modal-content">
            <div id="receipt-preview-container"></div>
            
            <div class="modal-buttons">
                <button onclick="sendToDiscord()" id="send-discord-btn" class="discord-btn">
                    <i class="fab fa-discord"></i> Wyślij raport na Discord
                </button>
                <button onclick="closeModal()" class="close-btn">
                    <i class="fas fa-times"></i> Zamknij
                </button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2><i class="fas fa-truck-loading"></i> Lista do eksportu</h2>
            <button id="close-cart-btn" class="close-btn-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items-container" class="cart-items-container">
            <div class="empty-cart-msg">Brak przedmiotów</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Wartość:</span>
                <span id="cart-sidebar-total">0$</span>
            </div>
        </div>
    </div>

    <div id="receipt-capture-area" style="position: absolute; left: -9999px; background: white; padding: 40px; width: 450px;"></div>

    <div id="toast-container" class="toast-container"></div>

    <script src="sprzedaz-script.js"></script>
</body>
</html>
